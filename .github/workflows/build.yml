permissions:
  contents: write

name: Build DEB Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y dpkg-dev
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app (Linux binary)
        run: |
          pyinstaller --onedir --noconsole \
            --add-data "vgca.png:." \
            --name vgca-signer \
            main.py

      - name: Build .deb package
        run: |
          chmod +x build_deb/usr/bin/vgca-signer
          dpkg-deb --build build_deb vgca-signer.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: vgca-signer.deb

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: vgca-signer.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
